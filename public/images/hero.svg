<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Exterior house cleaning scene">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe8ff"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="spray" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7cc4ff" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#bfe3ff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="cleanWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eaf3fb"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1320" cy="180" r="90" fill="#ffe89c" opacity="0.85"/>

  <!-- ground -->
  <rect y="780" width="1600" height="220" fill="#dfeae0"/>
  <rect y="780" width="1600" height="14" fill="#cde0d2"/>

  <!-- house body (freshly washed) -->
  <rect x="430" y="360" width="740" height="430" rx="6" fill="url(#cleanWall)" stroke="#cdddec" stroke-width="3"/>
  <!-- roof -->
  <polygon points="400,360 800,170 1200,360" fill="#3f6f8f"/>
  <polygon points="400,360 800,170 800,360" fill="#4f82a3"/>
  <!-- door -->
  <rect x="740" y="600" width="120" height="190" rx="4" fill="#2f5c79"/>
  <circle cx="838" cy="700" r="6" fill="#cfe3f2"/>
  <!-- windows -->
  <g fill="#bfe0f5" stroke="#9cc6e2" stroke-width="3">
    <rect x="520" y="440" width="120" height="110" rx="4"/>
    <rect x="960" y="440" width="120" height="110" rx="4"/>
    <rect x="520" y="600" width="120" height="110" rx="4"/>
    <rect x="960" y="600" width="120" height="110" rx="4"/>
  </g>

  <!-- pressure washer spray fan from lower-left -->
  <polygon points="120,860 470,470 540,520 200,900" fill="url(#spray)"/>
  <g fill="#7cc4ff">
    <circle cx="300" cy="640" r="6" opacity="0.7"/>
    <circle cx="360" cy="600" r="5" opacity="0.6"/>
    <circle cx="420" cy="560" r="7" opacity="0.7"/>
    <circle cx="250" cy="700" r="5" opacity="0.5"/>
    <circle cx="200" cy="760" r="6" opacity="0.5"/>
  </g>

  <!-- sparkle on clean wall -->
  <g fill="#ffffff">
    <path d="M1090 420 l10 26 26 10 -26 10 -10 26 -10 -26 -26 -10 26 -10 z" opacity="0.9"/>
    <path d="M600 400 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z" opacity="0.8"/>
  </g>
</svg>
